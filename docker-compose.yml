version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hcm
      POSTGRES_PASSWORD: hcm
      POSTGRES_DB: hcm
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: postgres://hcm:hcm@postgres:5432/hcm
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    depends_on:
      - server
    ports:
      - '3000:3000'

volumes:
  postgres_data:

